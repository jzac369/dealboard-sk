<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Pridať dealy – Maslo & Elmex</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
  .card { border: 1px solid #ddd; border-radius: 10px; padding: 18px; margin-bottom: 24px; }
  button { background: #E8590C; color: #fff; border: none; padding: 14px 24px; border-radius: 8px;
    font-size: 1rem; font-weight: 700; cursor: pointer; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .result { margin-top: 14px; padding: 12px; border-radius: 8px; font-size: .9rem; }
  .ok { background: #e6f4ea; color: #1e6b34; }
  .err { background: #fde8e8; color: #a3262c; }
  pre { white-space: pre-wrap; font-size: .8rem; }
</style>
</head>
<body>
  <h2>Pridať dealy do Firestore</h2>

  <div class="card">
    <h3>1. Maslo (Lidl)</h3>
    <button id="btn1">Pridať deal: Maslo</button>
    <div class="result" id="result1"></div>
  </div>

  <div class="card">
    <h3>2. elmex Caries Protection zubná pasta (Allegro)</h3>
    <button id="btn2">Pridať deal: Zubná pasta</button>
    <div class="result" id="result2"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAZhsfBl5xLpILC2r2knGar2RgxqXK7yBQ",
      authDomain:        "dealboard-e60bf.firebaseapp.com",
      projectId:         "dealboard-e60bf",
      storageBucket:     "dealboard-e60bf.firebasestorage.app",
      messagingSenderId: "16233224810",
      appId:             "1:16233224810:web:9d0fa4d5faa49ac4c10813"
    };
    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) signInAnonymously(auth).catch(e => console.error(e));
    });

    async function getInitialStatus(type) {
      try {
        const snap = await getDoc(doc(db, "settings", "moderation"));
        const data = snap.exists() ? snap.data() : {};
        const field = type + 'Required';
        const required = data[field] !== false;
        return required ? 'pending' : 'approved';
      } catch(e) {
        return 'pending';
      }
    }

    async function addDeal(dealData, btn, resultEl) {
      btn.disabled = true;
      btn.textContent = 'Pridávam…';
      try {
        const status = await getInitialStatus('deals');
        const docRef = await addDoc(collection(db, "deals"), { ...dealData, status, timestamp: serverTimestamp() });
        resultEl.className = 'result ok';
        resultEl.innerHTML = `<strong>Hotovo!</strong> ID: ${docRef.id}<br>Status: <strong>${status}</strong>` +
          (status === 'pending' ? '<br>Čaká na schválenie v admin paneli.' : '<br>Je už live na stránke.');
        btn.textContent = 'Pridané ✓';
      } catch (e) {
        resultEl.className = 'result err';
        resultEl.innerHTML = `<strong>Chyba:</strong><pre>${e.message}</pre>`;
        btn.disabled = false;
        btn.textContent = 'Skúsiť znova';
      }
    }

    document.getElementById('btn1').onclick = () => addDeal({
      author: "Tom69",
      title: "Maslo",
      store: "Lidl",
      dealPrice: 0.99,
      originalPrice: null,
      category: "Jedlo & Nápoje",
      url: "https://www.lidl.sk/p/maslo/p10031672",
      imageUrl: null,
      description: "Akciová cena na maslo v Lidli. Cena a dostupnosť sa môže meniť podľa aktuálneho letáku – odporúčame overiť priamo v predajni alebo na webe.",
      currency: "€",
      votes: 0,
      comments: 0
    }, document.getElementById('btn1'), document.getElementById('result1'));

    document.getElementById('btn2').onclick = () => addDeal({
      author: "Tom69",
      title: "elmex Caries Protection zubná pasta proti zubnému kazu, duopack 2×75 ml",
      store: "Allegro.sk",
      dealPrice: 5.63,
      originalPrice: null,
      category: "Iné",
      url: "https://allegro.sk/produkt/elmex-caries-protection-zubna-pasta-proti-zubnemu-kazu-duopack-2x75-ml-cf8ad712-695d-44cb-8ff9-7c73bf6a2aed?offerId=18618391720",
      imageUrl: null,
      description: "Zubná pasta elmex Caries Protection s aminofluoridom (Olaflur, ~1450 ppm F) na ochranu proti zubnému kazu a remineralizáciu skloviny. Výhodné balenie duopack 2×75 ml. Predajca: Drogerie_Visage (Super predajca), hodnotenie 4,89/5.",
      currency: "€",
      votes: 0,
      comments: 0
    }, document.getElementById('btn2'), document.getElementById('result2'));
  </script>
</body>
</html>
