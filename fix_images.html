  function log(msg, cls) {
    const el = document.getElementById('log');
    el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  window.runFix = async function() {
    const btn = document.getElementById('fix-btn');
    btn.disabled = true;
    btn.textContent = 'Opravujem…';

    const q = query(collection(db, "deals"), where("author", "==", "Tom69"));
    const snap = await getDocs(q);
    log(`Nájdených ${snap.size} dealov od Tom69.`);

    let fixed = 0, skipped = 0;
    for (const docSnap of snap.docs) {
      const data = docSnap.data();
      const newUrl = FIXED_IMAGES[data.title];
      if (!newUrl) {
        skipped++;
        log(`– Preskočené (nenájdená oprava): ${data.title}`);
        continue;
      }
      try {
        await updateDoc(doc(db, "deals", docSnap.id), { imageUrl: newUrl });
        fixed++;
        log(`✓ Opravené: ${data.title}`, 'ok');
      } catch(e) {
        log(`✗ Zlyhalo: ${data.title}: ${e.message}`, 'err');
      }
    }
    log(`\nHOTOVO: ${fixed} opravených, ${skipped} preskočených.`, 'ok');
    btn.textContent = 'Oprava dokončená';
  };
</script>
