  function log(msg, cls) {
    const el = document.getElementById('log');
    el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  async function getInitialStatus() {
    try {
      const snap = await getDoc(doc(db, "settings", "moderation"));
      const data = snap.exists() ? snap.data() : {};
      const required = data.couponsRequired !== false;
      return required ? 'pending' : 'approved';
    } catch(e) {
      return 'pending';
    }
  }

  window.runImport = async function() {
    const btn = document.getElementById('import-btn');
    btn.disabled = true;
    btn.textContent = 'Importujem…';
    log(`Začínam import ${COUPONS.length} kódov...`);

    const status = await getInitialStatus();
    log(`Stav moderácie kupónov: ${status === 'approved' ? 'vypnutá (zverejní sa hneď)' : 'zapnutá (pôjde na schválenie)'}`);

    let success = 0, failed = 0;
    for (const c of COUPONS) {
      try {
        await addDoc(collection(db, "coupons"), {
          author: c.author,
          code: c.code,
          store: c.store,
          discount: c.discount,
          url: c.url,
          description: c.description || '',
          expiryDate: c.expiryDate || null,
          votes: 0,
          status,
          timestamp: serverTimestamp()
        });
        success++;
        log(`✓ ${c.code} (${c.store})`, 'ok');
      } catch(e) {
        failed++;
        log(`✗ ${c.code}: ${e.message}`, 'err');
      }
    }
    log(`\nHOTOVO: ${success} úspešne, ${failed} zlyhalo.`, success === COUPONS.length ? 'ok' : '');
    btn.textContent = 'Import dokončený';
  };
