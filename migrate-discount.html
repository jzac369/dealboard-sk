<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Migrácia: discountPercent</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; }
  button { background: #E8590C; color: #fff; border: none; padding: 14px 24px; border-radius: 8px;
    font-size: 1rem; font-weight: 700; cursor: pointer; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #log { margin-top: 20px; padding: 14px; border-radius: 8px; background: #f5f5f5; font-size: .85rem;
    white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
  <h2>Jednorazová migrácia: doplnenie <code>discountPercent</code></h2>
  <p>Prejde všetky existujúce dealy (všetky statusy) a doplní vypočítané pole <code>discountPercent</code>
     tam, kde chýba. Potrebné pre triedenie "Najväčšia zľava" v novom stránkovanom systéme.
     Po dokončení môže byť tento súbor zmazaný z repozitára.</p>
  <button id="btn">Spustiť migráciu</button>
  <div id="log"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAZhsfBl5xLpILC2r2knGar2RgxqXK7yBQ",
      authDomain:        "dealboard-e60bf.firebaseapp.com",
      projectId:         "dealboard-e60bf",
      storageBucket:     "dealboard-e60bf.firebasestorage.app",
      messagingSenderId: "16233224810",
      appId:             "1:16233224810:web:9d0fa4d5faa49ac4c10813"
    };
    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const logEl = document.getElementById('log');
    function log(msg) { logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; }

    let authReady = false;
    let isAdminUser = false;
    onAuthStateChanged(auth, (user) => {
      authReady = true;
      isAdminUser = !!user && user.providerData.some(p => p.providerId === 'password');
      if (!user) {
        log('⚠️ Nie si prihlásený. Najprv sa prihlás do admin.html v TOMTO PREHLIADAČI (rovnaká karta/profil), potom otvor túto stránku znova.');
      } else if (!isAdminUser) {
        log('⚠️ Prihlásený si len anonymne. Najprv sa prihlás do admin.html v tomto prehliadači (email/heslo), potom skús znova.');
      } else {
        log('✓ Prihlásený ako admin. Môžeš spustiť migráciu.');
      }
    });

    document.getElementById('btn').onclick = async () => {
      const btn = document.getElementById('btn');
      if (!authReady) { log('Ešte sa zisťuje prihlásenie, skús o sekundu.'); return; }
      if (!isAdminUser) { log('❌ Migrácia vyžaduje prihlásenie ako admin (pozri hlášku vyššie).'); return; }
      btn.disabled = true;
      btn.textContent = 'Migrujem…';
      log('Načítavam dealy…');
      try {
        const snap = await getDocs(collection(db, 'deals'));
        log(`Nájdených ${snap.docs.length} dealov celkovo.`);
        let updated = 0, skipped = 0;
        for (const d of snap.docs) {
          const data = d.data();
          if (typeof data.discountPercent === 'number') { skipped++; continue; }
          const discountPercent = (data.originalPrice && data.dealPrice && data.originalPrice > data.dealPrice)
            ? Math.round((1 - data.dealPrice / data.originalPrice) * 100) : 0;
          await updateDoc(doc(db, 'deals', d.id), { discountPercent });
          updated++;
          log(`✓ ${data.title || d.id} → discountPercent: ${discountPercent}`);
        }
        log(`\nHotovo! Aktualizovaných: ${updated}, preskočených (už mali pole): ${skipped}.`);
        btn.textContent = 'Hotovo ✓';
      } catch (e) {
        log('❌ Chyba: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Skúsiť znova';
      }
    };
  </script>
</body>
</html>
