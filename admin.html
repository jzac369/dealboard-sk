<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealBoard – Admin</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, collectionGroup, onSnapshot, doc, updateDoc, deleteDoc, increment, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ─── Rovnaké Firebase údaje ako v index.html ───────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyAZhsfBl5xLpILC2r2knGar2RgxqXK7yBQ",
    authDomain:        "dealboard-e60bf.firebaseapp.com",
    projectId:         "dealboard-e60bf",
    storageBucket:     "dealboard-e60bf.firebasestorage.app",
    messagingSenderId: "16233224810",
    appId:             "1:16233224810:web:9d0fa4d5faa49ac4c10813"
  };
  // ──────────────────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  let allDeals = [];
  let allComments = [];
  let allCoupons = [];
  let unsub = null;
  let unsubComments = null;
  let unsubCoupons = null;

  onAuthStateChanged(auth, async (user) => {
    const loginView = document.getElementById('login-view');
    const adminView = document.getElementById('admin-view');
    if (user && !user.isAnonymous) {
      const idTokenResult = await user.getIdTokenResult();
      console.log('Auth debug: uid =', user.uid, 'isAnonymous =', user.isAnonymous, 'sign_in_provider =', idTokenResult.claims.firebase?.sign_in_provider, 'email =', user.email);
      loginView.style.display = 'none';
      adminView.style.display = 'block';
      document.getElementById('admin-email').textContent = user.email;
      startListening();
      startListeningComments();
      startListeningCoupons();
    } else {
      console.log('Auth debug: no admin user. user =', user, 'isAnonymous =', user && user.isAnonymous);
      loginView.style.display = 'flex';
      adminView.style.display = 'none';
      if (unsub) { unsub(); unsub = null; }
      if (unsubComments) { unsubComments(); unsubComments = null; }
      if (unsubCoupons) { unsubCoupons(); unsubCoupons = null; }
    }
  });

  function startListeningCoupons() {
    const q = query(collection(db, "coupons"), orderBy("timestamp", "desc"));
    unsubCoupons = onSnapshot(q, (snap) => {
      allCoupons = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCoupons();
    });
  }

  function startListening() {
    const q = query(collection(db, "deals"), orderBy("timestamp", "desc"));
    unsub = onSnapshot(q, (snap) => {
      allDeals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });
  }

  function startListeningComments() {
    const cq = query(collectionGroup(db, "comments"), orderBy("timestamp", "desc"));
    unsubComments = onSnapshot(cq, (snap) => {
      console.log('Comments snapshot received. Doc count:', snap.docs.length);
      allComments = snap.docs.map(d => ({
        id: d.id,
        dealId: d.ref.parent.parent.id,
        ...d.data()
      }));
      console.log('allComments:', JSON.stringify(allComments));
      renderComments();
    }, (err) => {
      console.error('Comments collectionGroup error. Code:', err.code, 'Message:', err.message, 'Full error:', err);
    });
  }

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      errEl.textContent = 'Nesprávny email alebo heslo.';
      errEl.style.display = 'block';
    }
  };

  window.doLogout = function() { signOut(auth); };

  window.approveDeal = async function(id) {
    await updateDoc(doc(db, "deals", id), { status: 'approved' });
  };

  window.rejectDeal = async function(id) {
    await updateDoc(doc(db, "deals", id), { status: 'rejected' });
  };

  window.archiveDeal = async function(id) {
    await updateDoc(doc(db, "deals", id), { status: 'archived' });
  };

  window.restoreDeal = async function(id) {
    await updateDoc(doc(db, "deals", id), { status: 'pending' });
  };

  window.deleteDeal = async function(id) {
    if (!confirm('Naozaj natrvalo vymazať tento deal? Toto sa nedá vrátiť späť (skús Archivovať, ak chceš zachovať možnosť obnovy).')) return;
    await deleteDoc(doc(db, "deals", id));
  };

  // ── Komentáre ────────────────────────────────────────────────────────────
  window.approveComment = async function(dealId, commentId) {
    await updateDoc(doc(db, "deals", dealId, "comments", commentId), { status: 'approved' });
    await updateDoc(doc(db, "deals", dealId), { comments: increment(1) });
  };

  window.rejectComment = async function(dealId, commentId, wasApproved) {
    await updateDoc(doc(db, "deals", dealId, "comments", commentId), { status: 'rejected' });
    if (wasApproved) {
      await updateDoc(doc(db, "deals", dealId), { comments: increment(-1) });
    }
  };

  window.deleteComment = async function(dealId, commentId, wasApproved) {
    if (!confirm('Naozaj natrvalo vymazať tento komentár?')) return;
    await deleteDoc(doc(db, "deals", dealId, "comments", commentId));
    if (wasApproved) {
      await updateDoc(doc(db, "deals", dealId), { comments: increment(-1) });
    }
  };

  let activeCommentTab = 'pending';
  window.setCommentTab = function(tab, btn) {
    activeCommentTab = tab;
    document.querySelectorAll('.comment-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderComments();
  };

  function renderComments() {
    const pending  = allComments.filter(c => c.status === 'pending');
    const approved = allComments.filter(c => c.status === 'approved');
    const rejected = allComments.filter(c => c.status === 'rejected');

    document.getElementById('ccount-pending').textContent = pending.length;
    document.getElementById('ccount-approved').textContent = approved.length;
    document.getElementById('ccount-rejected').textContent = rejected.length;

    const map = { pending, approved, rejected };
    const list = map[activeCommentTab] || pending;

    const el = document.getElementById('comment-list');
    if (!el) return;
    if (!list.length) {
      el.innerHTML = `<div class="empty">Žiadne komentáre v tejto kategórii.</div>`;
      return;
    }
    el.innerHTML = list.map(c => commentRowTemplate(c)).join('');
  }

  function commentRowTemplate(c) {
    const deal = allDeals.find(d => d.id === c.dealId);
    const dealTitle = deal ? deal.title : '(neznámy deal)';
    const wasApproved = c.status === 'approved';
    const statusBadge = {
      pending:  '<span class="badge badge-pending">Na schválenie</span>',
      approved: '<span class="badge badge-approved">Schválené</span>',
      rejected: '<span class="badge badge-rejected">Zamietnuté</span>'
    }[c.status] || '';
    return `
    <div class="deal-row">
      <div class="row-header">
        <div class="row-info">
          <div class="row-title"><strong>${escapeHtml(c.nickname||'Anonym')}</strong> ${statusBadge}</div>
          <div class="row-sub">k deal-u: <em>${escapeHtml(dealTitle)}</em></div>
          <div class="comment-body-text">${escapeHtml(c.text||'')}</div>
        </div>
        <div class="row-actions">
          ${c.status === 'pending' ? `
            <button class="btn btn-approve" onclick="approveComment('${c.dealId}','${c.id}')">✓ Schváliť</button>
            <button class="btn btn-reject" onclick="rejectComment('${c.dealId}','${c.id}', false)">✕ Zamietnuť</button>
          ` : ''}
          ${c.status === 'rejected' ? `
            <button class="btn btn-approve" onclick="approveComment('${c.dealId}','${c.id}')">✓ Schváliť</button>
          ` : ''}
          ${c.status === 'approved' ? `
            <button class="btn btn-reject" onclick="rejectComment('${c.dealId}','${c.id}', true)">Skryť</button>
          ` : ''}
          <button class="btn btn-delete" onclick="deleteComment('${c.dealId}','${c.id}', ${wasApproved})">🗑 Vymazať</button>
        </div>
      </div>
    </div>`;
  }

  // ── Zľavové kódy ─────────────────────────────────────────────────────────
  window.approveCoupon = async function(id) {
    await updateDoc(doc(db, "coupons", id), { status: 'approved' });
  };
  window.rejectCoupon = async function(id) {
    await updateDoc(doc(db, "coupons", id), { status: 'rejected' });
  };
  window.archiveCoupon = async function(id) {
    await updateDoc(doc(db, "coupons", id), { status: 'archived' });
  };
  window.restoreCoupon = async function(id) {
    await updateDoc(doc(db, "coupons", id), { status: 'pending' });
  };
  window.deleteCoupon = async function(id) {
    if (!confirm('Naozaj natrvalo vymazať tento kód?')) return;
    await deleteDoc(doc(db, "coupons", id));
  };
  window.saveCouponEdit = async function(id) {
    const get = (f) => document.getElementById(`cp-${f}-${id}`).value.trim();
    const updates = {
      code: get('code').toUpperCase(),
      store: get('store'),
      discount: get('discount'),
      url: get('url'),
      expiryDate: get('expiry') || null,
      description: get('desc')
    };
    await updateDoc(doc(db, "coupons", id), updates);
    alert('Uložené.');
  };

  let activeCouponTab = 'pending';
  window.setCouponTab = function(tab, btn) {
    activeCouponTab = tab;
    document.querySelectorAll('.coupon-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCoupons();
  };

  function renderCoupons() {
    const pending  = allCoupons.filter(c => c.status === 'pending');
    const approved = allCoupons.filter(c => c.status === 'approved');
    const rejected = allCoupons.filter(c => c.status === 'rejected');
    const archived = allCoupons.filter(c => c.status === 'archived');

    const elP = document.getElementById('coupcount-pending');
    if (!elP) return; // sekcia ešte nie je v DOM
    elP.textContent = pending.length;
    document.getElementById('coupcount-approved').textContent = approved.length;
    document.getElementById('coupcount-rejected').textContent = rejected.length;
    document.getElementById('coupcount-archived').textContent = archived.length;

    const map = { pending, approved, rejected, archived };
    const list = map[activeCouponTab] || pending;

    const el = document.getElementById('coupon-list');
    if (!list.length) {
      el.innerHTML = `<div class="empty">Žiadne kódy v tejto kategórii.</div>`;
      return;
    }
    el.innerHTML = list.map(c => couponRowTemplate(c)).join('');
  }

  function couponRowTemplate(c) {
    const statusBadge = {
      pending:  '<span class="badge badge-pending">Na schválenie</span>',
      approved: '<span class="badge badge-approved">Schválené</span>',
      rejected: '<span class="badge badge-rejected">Zamietnuté</span>',
      archived: '<span class="badge badge-archived">Archivované</span>'
    }[c.status] || '';

    return `
    <div class="deal-row">
      <div class="row-header">
        <div class="row-thumb row-thumb-empty">🎟️</div>
        <div class="row-info">
          <div class="row-title"><strong>${escapeHtml(c.code||'')}</strong> ${statusBadge}</div>
          <div class="row-sub">${escapeHtml(c.store||'')} · ${escapeHtml(c.discount||'')} · ${c.votes||0} hlasov</div>
        </div>
        <div class="row-actions">
          ${c.status === 'pending' ? `
            <button class="btn btn-approve" onclick="approveCoupon('${c.id}')">✓ Schváliť</button>
            <button class="btn btn-reject" onclick="rejectCoupon('${c.id}')">✕ Zamietnuť</button>
          ` : ''}
          ${c.status === 'rejected' ? `
            <button class="btn btn-approve" onclick="approveCoupon('${c.id}')">✓ Schváliť</button>
            <button class="btn btn-archive" onclick="archiveCoupon('${c.id}')">📦 Archivovať</button>
          ` : ''}
          ${c.status === 'approved' ? `
            <button class="btn btn-reject" onclick="rejectCoupon('${c.id}')">Skryť</button>
            <button class="btn btn-archive" onclick="archiveCoupon('${c.id}')">📦 Archivovať</button>
          ` : ''}
          ${c.status === 'archived' ? `
            <button class="btn btn-restore" onclick="restoreCoupon('${c.id}')">↩ Obnoviť</button>
          ` : ''}
          <button class="btn btn-delete" onclick="deleteCoupon('${c.id}')">🗑 Vymazať</button>
          <button class="btn btn-edit" onclick="toggleCouponEdit('${c.id}')">✎ Upraviť</button>
        </div>
      </div>
      <div class="edit-panel" id="coupedit-${c.id}">
        <div class="edit-grid">
          <div><label>Kód</label><input id="cp-code-${c.id}" value="${escapeAttr(c.code)}"></div>
          <div><label>E-shop</label><input id="cp-store-${c.id}" value="${escapeAttr(c.store)}"></div>
          <div><label>Zľava</label><input id="cp-discount-${c.id}" value="${escapeAttr(c.discount)}"></div>
          <div><label>Platí do</label><input id="cp-expiry-${c.id}" value="${escapeAttr(c.expiryDate)}"></div>
          <div class="full"><label>URL (affiliate link)</label><input id="cp-url-${c.id}" value="${escapeAttr(c.url)}"></div>
          <div class="full"><label>Popis</label><textarea id="cp-desc-${c.id}" rows="2">${escapeHtml(c.description||'')}</textarea></div>
        </div>
        <button class="btn btn-save" onclick="saveCouponEdit('${c.id}')">💾 Uložiť zmeny</button>
      </div>
    </div>`;
  }

  window.toggleCouponEdit = function(id) {
    const el = document.getElementById(`coupedit-${id}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  };

  function resizeImageToBase64(file) {
    const MAX_DIM = 640;
    const MAX_OUTPUT_CHARS = 700 * 1024;
    return new Promise((resolve, reject) => {
      if (!file.type.startsWith('image/')) { reject(new Error('not-image')); return; }
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('not-image'));
      reader.onload = (readerEvent) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > MAX_DIM) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
          else if (height > MAX_DIM) { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          let quality = 0.82;
          let dataUrl = canvas.toDataURL('image/jpeg', quality);
          while (dataUrl.length > MAX_OUTPUT_CHARS && quality > 0.3) {
            quality -= 0.1;
            dataUrl = canvas.toDataURL('image/jpeg', quality);
          }
          resolve(dataUrl);
        };
        img.onerror = () => reject(new Error('not-image'));
        img.src = readerEvent.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  window.saveEdit = async function(id) {
    const get = (f) => document.getElementById(`e-${f}-${id}`).value.trim();
    const fileInput = document.getElementById(`e-imgfile-${id}`);
    let imageUrl = get('img') || null;
    if (fileInput.files[0]) {
      try {
        imageUrl = await resizeImageToBase64(fileInput.files[0]);
      } catch(e) {
        alert('Nepodarilo sa spracovať obrázok.');
        return;
      }
    }
    const updates = {
      title: get('title'),
      store: get('store'),
      category: get('cat'),
      url: get('url'),
      imageUrl,
      description: get('desc'),
      dealPrice: parseFloat(get('deal')) || 0,
      originalPrice: parseFloat(get('orig')) || null
    };
    await updateDoc(doc(db, "deals", id), updates);
    alert('Uložené.');
  };

  window.setMainSection = function(section, btn) {
    document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('deals-section').style.display = section === 'deals' ? 'block' : 'none';
    document.getElementById('comments-section').style.display = section === 'comments' ? 'block' : 'none';
    document.getElementById('coupons-section').style.display = section === 'coupons' ? 'block' : 'none';
  };

  let activeTab = 'pending';
  window.setTab = function(tab, btn) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  function render() {
    const pending  = allDeals.filter(d => d.status === 'pending');
    const approved = allDeals.filter(d => d.status === 'approved');
    const rejected = allDeals.filter(d => d.status === 'rejected');
    const archived = allDeals.filter(d => d.status === 'archived');

    document.getElementById('count-pending').textContent = pending.length;
    document.getElementById('count-approved').textContent = approved.length;
    document.getElementById('count-rejected').textContent = rejected.length;
    document.getElementById('count-archived').textContent = archived.length;

    const map = { pending, approved, rejected, archived };
    const list = map[activeTab] || pending;

    const el = document.getElementById('deal-list');
    if (!list.length) {
      el.innerHTML = `<div class="empty">Žiadne dealy v tejto kategórii.</div>`;
      return;
    }
    el.innerHTML = list.map(d => rowTemplate(d)).join('');
  }

  function rowTemplate(d) {
    const statusBadge = {
      pending:  '<span class="badge badge-pending">Na schválenie</span>',
      approved: '<span class="badge badge-approved">Schválené</span>',
      rejected: '<span class="badge badge-rejected">Zamietnuté</span>',
      archived: '<span class="badge badge-archived">Archivované</span>'
    }[d.status] || '';

    const thumb = d.imageUrl
      ? `<img class="row-thumb" src="${d.imageUrl}" alt="">`
      : `<div class="row-thumb row-thumb-empty">📦</div>`;

    return `
    <div class="deal-row">
      <div class="row-header">
        ${thumb}
        <div class="row-info">
          <div class="row-title"><strong>${escapeHtml(d.title||'')}</strong> ${statusBadge}</div>
          <div class="row-sub">${escapeHtml(d.store||'')} · ${escapeHtml(d.category||'')} · ${d.votes||0} hlasov · ${d.dealPrice||0} €</div>
        </div>
        <div class="row-actions">
          ${d.status === 'pending' ? `
            <button class="btn btn-approve" onclick="approveDeal('${d.id}')">✓ Schváliť</button>
            <button class="btn btn-reject" onclick="rejectDeal('${d.id}')">✕ Zamietnuť</button>
          ` : ''}
          ${d.status === 'rejected' ? `
            <button class="btn btn-approve" onclick="approveDeal('${d.id}')">✓ Schváliť</button>
            <button class="btn btn-archive" onclick="archiveDeal('${d.id}')">📦 Archivovať</button>
          ` : ''}
          ${d.status === 'approved' ? `
            <button class="btn btn-reject" onclick="rejectDeal('${d.id}')">Skryť</button>
            <button class="btn btn-archive" onclick="archiveDeal('${d.id}')">📦 Archivovať</button>
          ` : ''}
          ${d.status === 'archived' ? `
            <button class="btn btn-restore" onclick="restoreDeal('${d.id}')">↩ Obnoviť</button>
          ` : ''}
          <button class="btn btn-delete" onclick="deleteDeal('${d.id}')">🗑 Vymazať</button>
          <button class="btn btn-edit" onclick="toggleEdit('${d.id}')">✎ Upraviť</button>
        </div>
      </div>
      <div class="edit-panel" id="edit-${d.id}">
        <div class="edit-grid">
          <div><label>Názov</label><input id="e-title-${d.id}" value="${escapeAttr(d.title)}"></div>
          <div><label>E-shop</label><input id="e-store-${d.id}" value="${escapeAttr(d.store)}"></div>
          <div><label>Kategória</label><input id="e-cat-${d.id}" value="${escapeAttr(d.category)}"></div>
          <div><label>Cena teraz (€)</label><input id="e-deal-${d.id}" type="number" value="${d.dealPrice||''}"></div>
          <div><label>Pôvodná cena (€)</label><input id="e-orig-${d.id}" type="number" value="${d.originalPrice||''}"></div>
          <div class="full"><label>URL (affiliate link)</label><input id="e-url-${d.id}" value="${escapeAttr(d.url)}"></div>
          <div class="full">
            <label>Obrázok</label>
            <div class="edit-img-row">
              ${d.imageUrl ? `<img src="${d.imageUrl}" class="edit-img-preview">` : `<div class="edit-img-preview edit-img-empty">📦</div>`}
              <input type="file" id="e-imgfile-${d.id}" accept="image/*">
            </div>
            <input type="hidden" id="e-img-${d.id}" value="${escapeAttr(d.imageUrl)}">
          </div>
          <div class="full"><label>Popis</label><textarea id="e-desc-${d.id}" rows="2">${escapeHtml(d.description||'')}</textarea></div>
        </div>
        <button class="btn btn-save" onclick="saveEdit('${d.id}')">💾 Uložiť zmeny</button>
      </div>
    </div>`;
  }

  window.toggleEdit = function(id) {
    const el = document.getElementById(`edit-${id}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
  };

  function escapeHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escapeAttr(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  }
</script>

<style>
  :root {
    --orange: #E8590C; --orange-dk: #C44C0A; --green: #2E8B3D; --red: #C0392B;
    --ink: #1A1A1A; --muted: #707070; --line: #E2E2E2; --bg: #EDEDED; --card: #FFFFFF;
    font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* Login */
  #login-view { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--card); border-radius: 12px; padding: 32px; width: 100%; max-width: 360px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1); }
  .login-box h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: .85rem; margin-bottom: 20px; }
  .login-box label { font-size: .85rem; font-weight: 600; display: block; margin: 12px 0 4px; }
  .login-box input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 6px; font-size: .9rem; }
  .login-box button { width: 100%; margin-top: 18px; background: var(--orange); color: #fff; border: none;
    padding: 11px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .95rem; }
  .login-box button:hover { background: var(--orange-dk); }
  #login-error { display: none; color: var(--red); font-size: .82rem; margin-top: 10px; }

  /* Admin view */
  #admin-view { display: none; }
  header { background: var(--card); border-bottom: 1px solid var(--line); padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.1rem; }
  header h1 span { color: var(--orange); }
  .top-right { display: flex; align-items: center; gap: 14px; font-size: .85rem; color: var(--muted); }
  .top-right button { background: none; border: 1.5px solid var(--line); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: .82rem; }

  .container { max-width: 980px; margin: 0 auto; padding: 20px 16px; }
  .main-tabs { display: flex; gap: 10px; margin-bottom: 18px; }
  .main-tab-btn { background: var(--card); border: 1.5px solid var(--line); padding: 10px 20px; border-radius: 8px;
    cursor: pointer; font-size: .92rem; font-weight: 700; color: var(--ink); }
  .main-tab-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .comment-body-text { font-size: .85rem; color: var(--ink); margin-top: 6px; background: var(--bg);
    padding: 8px 10px; border-radius: 6px; line-height: 1.4; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn { background: var(--card); border: 1.5px solid var(--line); padding: 9px 16px; border-radius: 8px;
    cursor: pointer; font-size: .88rem; font-weight: 600; color: var(--muted); }
  .tab-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  .deal-row { background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px; }
  .row-header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .row-thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
    border: 1px solid var(--line); flex-shrink: 0; background: #f5f5f5; }
  .row-thumb-empty { display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    color: var(--muted); }
  .row-info { flex: 1; min-width: 160px; }
  .row-title { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .row-sub { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { border: none; padding: 6px 12px; border-radius: 6px; font-size: .78rem; font-weight: 700; cursor: pointer; }
  .btn-approve { background: #e3f3e6; color: var(--green); }
  .btn-reject  { background: #fdeceb; color: var(--red); }
  .btn-delete  { background: #fdeceb; color: var(--red); }
  .btn-edit    { background: #eef0ff; color: #3b4cca; }
  .btn-archive { background: #f1ecff; color: #6b3fc9; }
  .btn-restore { background: #e3f3e6; color: var(--green); }
  .btn-save    { background: var(--orange); color: #fff; margin-top: 10px; }

  .badge { font-size: .7rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
  .badge-pending  { background: #fff3cd; color: #8a6200; }
  .badge-approved { background: #e3f3e6; color: var(--green); }
  .badge-rejected { background: #fdeceb; color: var(--red); }
  .badge-archived { background: #ece7f7; color: #6b3fc9; }

  .edit-panel { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .edit-grid .full { grid-column: 1 / -1; }
  .edit-grid label { font-size: .78rem; font-weight: 600; display: block; margin-bottom: 3px; }
  .edit-grid input, .edit-grid textarea { width: 100%; padding: 7px 10px; border: 1.5px solid var(--line);
    border-radius: 5px; font-size: .85rem; font-family: inherit; }
  .edit-img-row { display: flex; align-items: center; gap: 12px; }
  .edit-img-preview { width: 56px; height: 56px; border-radius: 6px; object-fit: cover;
    border: 1px solid var(--line); flex-shrink: 0; }
  .edit-img-empty { display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    color: var(--muted); background: #f5f5f5; }

  .empty { text-align: center; padding: 40px; color: var(--muted); background: var(--card);
    border-radius: 8px; border: 1px solid var(--line); }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-box">
    <h1>DealBoard <span>Admin</span></h1>
    <p>Prihlás sa pre správu dealov</p>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tvoj@email.sk">
    <label>Heslo</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <div id="login-error"></div>
    <button onclick="doLogin()">Prihlásiť sa</button>
  </div>
</div>

<div id="admin-view">
  <header>
    <h1>DealBoard <span>Admin</span></h1>
    <div class="top-right">
      <span id="admin-email"></span>
      <button onclick="doLogout()">Odhlásiť sa</button>
    </div>
  </header>

  <div class="container">
    <div class="main-tabs">
      <button class="main-tab-btn active" onclick="setMainSection('deals', this)">📦 Dealy</button>
      <button class="main-tab-btn" onclick="setMainSection('comments', this)">💬 Komentáre</button>
      <button class="main-tab-btn" onclick="setMainSection('coupons', this)">🎟️ Zľavové kódy</button>
    </div>

    <div id="deals-section">
      <div class="tabs">
        <button class="tab-btn active" onclick="setTab('pending', this)">Na schválenie (<span id="count-pending">0</span>)</button>
        <button class="tab-btn" onclick="setTab('approved', this)">Schválené (<span id="count-approved">0</span>)</button>
        <button class="tab-btn" onclick="setTab('rejected', this)">Zamietnuté (<span id="count-rejected">0</span>)</button>
        <button class="tab-btn" onclick="setTab('archived', this)">Archív (<span id="count-archived">0</span>)</button>
      </div>
      <div id="deal-list"></div>
    </div>

    <div id="comments-section" style="display:none;">
      <div class="tabs">
        <button class="tab-btn comment-tab-btn active" onclick="setCommentTab('pending', this)">Na schválenie (<span id="ccount-pending">0</span>)</button>
        <button class="tab-btn comment-tab-btn" onclick="setCommentTab('approved', this)">Schválené (<span id="ccount-approved">0</span>)</button>
        <button class="tab-btn comment-tab-btn" onclick="setCommentTab('rejected', this)">Zamietnuté (<span id="ccount-rejected">0</span>)</button>
      </div>
      <div id="comment-list"></div>
    </div>

    <div id="coupons-section" style="display:none;">
      <div class="tabs">
        <button class="tab-btn coupon-tab-btn active" onclick="setCouponTab('pending', this)">Na schválenie (<span id="coupcount-pending">0</span>)</button>
        <button class="tab-btn coupon-tab-btn" onclick="setCouponTab('approved', this)">Schválené (<span id="coupcount-approved">0</span>)</button>
        <button class="tab-btn coupon-tab-btn" onclick="setCouponTab('rejected', this)">Zamietnuté (<span id="coupcount-rejected">0</span>)</button>
        <button class="tab-btn coupon-tab-btn" onclick="setCouponTab('archived', this)">Archív (<span id="coupcount-archived">0</span>)</button>
      </div>
      <div id="coupon-list"></div>
    </div>
  </div>
</div>

</body>
</html>
