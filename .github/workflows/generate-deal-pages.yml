name: Generuj SEO stránky dealov

on:
  schedule:
    - cron: "0 */3 * * *"   # každé 3 hodiny
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-deal-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-cloud-firestore

      - name: Write Firebase credentials
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > firebase-credentials.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Generate deal pages + sitemap
        run: python generate_deal_pages.py
        env:
          FIRESTORE_PROJECT_ID: dealboard-e60bf

      - name: Cleanup credentials file
        if: always()
        run: rm -f firebase-credentials.json

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deal/ sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-generovanie SEO stránok dealov"
          git push
