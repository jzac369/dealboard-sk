  function log(msg, cls) {
    const el = document.getElementById('log');
    el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  async function getInitialStatus() {
    try {
      const snap = await getDoc(doc(db, "settings", "moderation"));
      const data = snap.exists() ? snap.data() : {};
      const required = data.dealsRequired !== false;
      return required ? 'pending' : 'approved';
    } catch(e) {
      return 'pending';
    }
  }

  window.runImport = async function() {
    const btn = document.getElementById('import-btn');
    btn.disabled = true;
    btn.textContent = 'Importujem…';
    log(`Začínam import ${DEALS.length} dealov...`);

    const status = await getInitialStatus();
    log(`Stav moderácie dealov: ${status === 'approved' ? 'vypnutá (zverejní sa hneď)' : 'zapnutá (pôjde na schválenie)'}`);

    let success = 0, failed = 0;
    for (const d of DEALS) {
      try {
        const [y, m, day] = d.dateStr.split('-').map(Number);
        const customDate = new Date(y, m - 1, day, 12, 0, 0);
        const customTimestamp = Timestamp.fromDate(customDate);

        await addDoc(collection(db, "deals"), {
          author: d.author,
          title: d.title,
          store: d.store,
          category: d.category,
          dealPrice: d.dealPrice,
          originalPrice: d.originalPrice,
          url: d.url,
          imageUrl: d.imageUrl,
          description: d.description,
          votes: 0,
          comments: 0,
          status,
          timestamp: customTimestamp
        });
        success++;
        log(`✓ ${d.title} (${d.dateStr})`, 'ok');
      } catch(e) {
        failed++;
        log(`✗ ${d.title}: ${e.message}`, 'err');
      }
    }
    log(`\nHOTOVO: ${success} úspešne, ${failed} zlyhalo.`, success === DEALS.length ? 'ok' : '');
    btn.textContent = 'Import dokončený';
  };
</script>
