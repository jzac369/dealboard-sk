<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Vymazanie dealov od Tom69 – HenKukaj.sk</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
  button { background: #C0392B; color: #fff; border: none; padding: 14px 28px; border-radius: 8px;
    font-size: 1rem; font-weight: 700; cursor: pointer; margin: 16px 0; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #log { background: #f5f5f5; border-radius: 8px; padding: 16px; font-family: monospace;
    font-size: .85rem; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
  .ok { color: #2E8B3D; }
  .err { color: #C0392B; }
</style>
</head>
<body>
<h1>⚠️ Vymazanie všetkých dealov od Tom69</h1>
<p>Toto natrvalo vymaže všetky dealy s autorom <strong>Tom69</strong> z databázy. Použi to pred opätovným importom s opravenými obrázkami.</p>
<button id="del-btn" onclick="runDelete()">Vymazať všetky dealy od Tom69</button>
<div id="log"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where, doc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAZhsfBl5xLpILC2r2knGar2RgxqXK7yBQ",
    authDomain:        "dealboard-e60bf.firebaseapp.com",
    projectId:         "dealboard-e60bf",
    storageBucket:     "dealboard-e60bf.firebasestorage.app",
    messagingSenderId: "16233224810",
    appId:             "1:16233224810:web:9d0fa4d5faa49ac4c10813"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) signInAnonymously(auth).catch(e => console.error(e));
  });

  function log(msg, cls) {
    const el = document.getElementById('log');
    el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  window.runDelete = async function() {
    if (!confirm('Naozaj natrvalo vymazať VŠETKY dealy od Tom69? Toto sa nedá vrátiť späť.')) return;
    const btn = document.getElementById('del-btn');
    btn.disabled = true;
    btn.textContent = 'Vymazávam…';

    const q = query(collection(db, "deals"), where("author", "==", "Tom69"));
    const snap = await getDocs(q);
    log(`Nájdených ${snap.size} dealov od Tom69.`);

    let deleted = 0, failed = 0;
    for (const docSnap of snap.docs) {
      try {
        await deleteDoc(doc(db, "deals", docSnap.id));
        deleted++;
        log(`✓ Vymazané: ${docSnap.data().title}`, 'ok');
      } catch(e) {
        failed++;
        log(`✗ Zlyhalo: ${docSnap.data().title}: ${e.message}`, 'err');
      }
    }
    log(`\nHOTOVO: ${deleted} vymazaných, ${failed} zlyhalo.`, 'ok');
    btn.textContent = 'Vymazávanie dokončené';
  };
</script>
</body>
</html>
