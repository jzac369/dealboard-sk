<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Pridať deal – Parkside vysávač</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
  button { background: #E8590C; color: #fff; border: none; padding: 14px 24px; border-radius: 8px;
    font-size: 1rem; font-weight: 700; cursor: pointer; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #result { margin-top: 20px; padding: 14px; border-radius: 8px; }
  .ok { background: #e6f4ea; color: #1e6b34; }
  .err { background: #fde8e8; color: #a3262c; }
  pre { white-space: pre-wrap; font-size: .85rem; }
</style>
</head>
<body>
  <h2>Pridať deal: Parkside vysávač PWD 12 B1</h2>
  <p>Klikni na tlačidlo nižšie. Po úspešnom pridaní môže byť tento súbor z repozitára zmazaný.</p>
  <button id="btn">Pridať deal do Firestore</button>
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, doc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAZhsfBl5xLpILC2r2knGar2RgxqXK7yBQ",
      authDomain:        "dealboard-e60bf.firebaseapp.com",
      projectId:         "dealboard-e60bf",
      storageBucket:     "dealboard-e60bf.firebasestorage.app",
      messagingSenderId: "16233224810",
      appId:             "1:16233224810:web:9d0fa4d5faa49ac4c10813"
    };
    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) signInAnonymously(auth).catch(e => console.error(e));
    });

    async function getInitialStatus(type) {
      try {
        const snap = await getDoc(doc(db, "settings", "moderation"));
        const data = snap.exists() ? snap.data() : {};
        const field = type + 'Required';
        const required = data[field] !== false;
        return required ? 'pending' : 'approved';
      } catch(e) {
        return 'pending';
      }
    }

    document.getElementById('btn').onclick = async () => {
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Pridávam…';
      try {
        const status = await getInitialStatus('deals');
        const dealData = {
          author: "Tom69",
          title: "Parkside Vysávač na mokré a suché vysávanie PWD 12 B1",
          store: "Lidl",
          dealPrice: 29.99,
          originalPrice: 39.99,
          category: "Dom & Záhrada",
          url: "https://www.lidl.sk/p/parkside-vysavac-na-mokre-a-suche-vysavanie-pwd-12-b1/p100406420",
          imageUrl: null,
          description: "Multifunkčný vysávač na mokré aj suché vysávanie s 12 l nádobou z nerezovej ocele. Príkon 1200 W, sací výkon 180 Air-Watt, max. podtlak 16,5 kPa. Súčasťou balenia je sacia hadica, štrbinová a podlahová hubica, 3-dielna sacia trubica a sada filtrov (papierový, textilný, penový). 4 kolieska pre stabilitu, 4 m sieťový kábel.",
          currency: "€",
          votes: 0,
          comments: 0,
          status,
          timestamp: serverTimestamp()
        };
        const docRef = await addDoc(collection(db, "deals"), dealData);
        result.className = 'ok';
        result.innerHTML = `<strong>Hotovo!</strong><br>Deal bol pridaný (ID: ${docRef.id}).<br>Status: <strong>${status}</strong>` +
          (status === 'pending' ? '<br>Čaká na schválenie v admin paneli.' : '<br>Je už live na stránke.');
        btn.textContent = 'Pridané ✓';
      } catch (e) {
        result.className = 'err';
        result.innerHTML = `<strong>Chyba:</strong><pre>${e.message}</pre>`;
        btn.disabled = false;
        btn.textContent = 'Skúsiť znova';
      }
    };
  </script>
</body>
</html>
